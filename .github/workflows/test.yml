name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ShellCheck (severity warning+)
        # ShellCheck binary ships preinstalled on ubuntu-latest runners.
        # Severity threshold suppresses info-level findings (SC1091 unresolved
        # source paths, SC2015 intentional A&&B||C assertion idiom in test harnesses).
        run: shellcheck --severity=warning plugins/bitacora/scripts/*.sh plugins/bitacora/statusline/*.sh

  shell-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Run [CTX] validator tests
        run: bash plugins/bitacora/scripts/test-validate-ctx.sh
      - name: Run since-window tests
        run: bash plugins/bitacora/scripts/test-since-window.sh
      - name: Run collision-check tests
        run: bash plugins/bitacora/scripts/test-collision-check.sh
      - name: Run staleness-check tests
        run: bash plugins/bitacora/scripts/test-staleness-check.sh
      - name: Run digest fixture tests
        run: bash plugins/bitacora/scripts/test-digest-fixtures.sh
      - name: Run standup-buckets tests
        run: bash plugins/bitacora/scripts/test-standup-buckets.sh
      - name: "Run /bit: alias sync tests"
        run: bash plugins/bitacora/scripts/test-sync-bit-aliases.sh
      - name: Run statusline tests
        run: bash plugins/bitacora/scripts/test-statusline.sh
      - name: Run statusline sync tests
        run: bash plugins/bitacora/scripts/test-sync-statusline.sh
      - name: Run handoff guardrail hook tests
        run: bash plugins/bitacora/scripts/test-precompact-handoff-check.sh
